<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title></title>
    <style>
        .coursesManagment {
            display: flex;
            background-color: #e6f2ff;
            padding: 20px;
            border-radius: 10px;
            margin-top: 24px;
            @media (max-width:767px) {
                display: block;
            }

            .logo

        {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border-radius: 10px;
            min-width: 140px;
            max-width: 140px;
            height: 140px;
            padding: 12px;
            margin-left: 16px;

            @media (max-width:767px) {
                min-width: 100px;
                max-width: 100px;
                height: 100px;
                margin: 0px;
                margin-bottom: 12px;
            }

            img

        {
            max-width: 100%;
            max-height: 100%;
        }

        }

        .title {
            text-align: right;
            margin: 0px;

            @media (max-width:767px) {
                font-size:22px;
            }
        }

        p {
            margin-top: 6px;
            font-weight: bold;

            @media (max-width:767px) {
                font-size:14px;
            }
        }

        }

    </style>
</head>
<body>
    <div class="coursesManagment" dir="rtl" style="font-weight: bold;">
        <div class="content">
            <h1 class="title">ادارة التدريب والتطوير</h1>
            <p>تأكيد بدء موعد الاختبار | @currentDateHijri هـ| @currentDate م </p>
            <p> <strong>عزيزى المستفيد</strong></p>
            <p><strong>تحية طيبة وبعد،</strong></p>
            <p><strong>نود إعلامكم بتحديد موعد بدء اختبار  ( @examName ). المحدد من  تاريخ @fromDate الى تاريخ @toDate   </strong></p>
        

             <div style=""> </div><br><div style="">نتمنى لكم وافر التوفيق </div><br><div style="">ادارة التدريب والتطوير  </div>
</div>
    </div>
</body>
</html>
